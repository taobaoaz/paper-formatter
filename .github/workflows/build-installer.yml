name: Build Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  build-installer:
    runs-on: windows-latest
    
    # 设置默认 shell 为 bash，避免编码问题
    defaults:
      run:
        shell: bash
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r ./启动文件/requirements.txt
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed \
          --name="paper-formatter" \
          --icon=./installer/app_icon.ico \
          ./核心模块/main.py
    
    - name: Rename EXE (remove Chinese characters)
      run: |
        mv dist/paper-formatter.exe dist/paper-formatter-installer.exe || true
        mv dist/论文排版优化器.exe dist/paper-formatter-installer.exe 2>/dev/null || true
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: paper-formatter-installer
        path: dist/paper-formatter-installer.exe
        retention-days: 30
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/paper-formatter-installer.exe
        generate_release_notes: false
        draft: true
        body: |
          ## Paper Formatter Installer

          ### Download
          Click on `paper-formatter-installer.exe` above to download.

          ### Usage
          1. Download the .exe file
          2. Double-click to run

          ### Release Notes
          Check `RELEASE_NOTES_v*.md` files in the repository for details.

          ---

          **GitHub Actions Build** | **Draft Release**
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
