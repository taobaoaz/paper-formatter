name: Build Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  build-installer:
    runs-on: windows-latest
    
    # 设置默认 shell 为 bash，避免编码问题
    defaults:
      run:
        shell: bash
    
    # 设置 UTF-8 环境变量
    env:
      PYTHONUTF8: 1
      PYTHONIOENCODING: utf-8
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Configure UTF-8 for Windows
      run: |
        # 设置 Windows 控制台编码为 UTF-8
        chcp 65001
        # 设置 PowerShell 编码为 UTF-8
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        # 设置环境变量
        $env:PYTHONUTF8 = "1"
        $env:PYTHONIOENCODING = "utf-8"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r ./launcher/requirements.txt
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed \
          --name="paper-formatter" \
          --add-data "modules/parsers:parsers" \
          --paths modules \
          --paths core \
          --hidden-import parsers \
          --icon=./installer/app_icon.ico \
          ./core/main.py
    
    - name: Rename EXE (remove Chinese characters)
      run: |
        mv dist/paper-formatter.exe dist/paper-formatter-installer.exe || true
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: paper-formatter-installer
        path: dist/paper-formatter-installer.exe
        retention-days: 30
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/paper-formatter-installer.exe
        generate_release_notes: false
        draft: true
        body: |
          ## Paper Formatter Installer

          ### Download
          Click on `paper-formatter-installer.exe` above to download.

          ### Usage
          1. Download the .exe file
          2. Double-click to run

          ### Release Notes
          Check `RELEASE_NOTES_v*.md` files in the repository for details.

          ---

          **GitHub Actions Build** | **Draft Release**
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}