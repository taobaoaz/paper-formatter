name: Build Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  build-installer:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller
        pip install -r 启动文件/requirements.txt
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name="论文排版优化器" --icon=installer/app_icon.ico 核心模块/main.py
      env:
        PYTHONPATH: .
    
    - name: Download Inno Setup
      run: |
        Invoke-WebRequest -Uri "https://jrsoftware.org/download.php/is.exe" -OutFile "is.exe"
        Start-Process "is.exe" -ArgumentList "/VERYSILENT /ALLUSERS /SUPPRESSMSGBOXES /NORESTART" -Wait
    
    - name: Compile Installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\installer.iss"
    
    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: 论文排版优化器安装程序
        path: installer_output/*.exe
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: installer_output/*.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
