name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    
    # 设置默认 shell 为 bash，避免编码问题
    defaults:
      run:
        shell: bash
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r ./启动文件/requirements.txt
    
    - name: Build EXE
      env:
        PYTHONPATH: "功能模块;核心模块"
      run: |
        pyinstaller --onefile --windowed \
          --name="论文排版优化器" \
          --add-data "功能模块/parsers;parsers" \
          --add-data "功能模块/rules;rules" \
          --paths 功能模块 \
          --paths 核心模块 \
          --hidden-import parsers \
          --hidden-import rules \
          ./核心模块/main.py
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: paper-formatter-windows
        path: dist/论文排版优化器.exe
        retention-days: 30
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/论文排版优化器.exe
        generate_release_notes: false
        draft: true
        body: |
          ## 📦 论文排版优化器 Windows 版本

          ### 下载地址
          - 点击上方的 `论文排版优化器-Windows.exe` 下载

          ### 安装说明
          1. 下载 `.exe` 文件
          2. 双击运行即可使用
          3. 无需安装，绿色版

          ### 更新内容
          请查看项目中的 `RELEASE_NOTES_v*.md` 文件获取详细信息。

          ---

          **GitHub Actions Build** | **Draft Release**
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
