name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        cd 启动文件
        pip install -r requirements.txt
    
    - name: Build EXE
      shell: bash
      run: |
        export PYTHONPATH="功能模块:核心模块:$PYTHONPATH"
        pyinstaller --onefile --windowed --name="论文排版优化器" \
          --add-data="功能模块/parsers:parsers" \
          --add-data="功能模块/rules:rules" \
          --paths=功能模块 \
          --paths=核心模块 \
          --hidden-import=parsers \
          --hidden-import=rules \
          核心模块/main.py
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: 论文排版优化器-Windows
        path: dist/论文排版优化器.exe
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/论文排版优化器.exe
        generate_release_notes: true
        draft: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
