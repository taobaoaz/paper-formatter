name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    
    # 设置默认 shell 为 bash，避免编码问题
    defaults:
      run:
        shell: bash
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r ./launcher/requirements.txt
    
    - name: Build EXE
      env:
        PYTHONPATH: "modules;core"
      run: |
        pyinstaller --onefile --windowed \
          --name="paper-formatter" \
          --add-data "modules/parsers:parsers" \
          --paths modules \
          --paths core \
          --hidden-import parsers \
          ./core/main.py
    
    - name: Rename EXE (remove Chinese characters)
      run: |
        mv dist/paper-formatter.exe dist/paper-formatter-windows.exe || true
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: paper-formatter-windows
        path: dist/paper-formatter-windows.exe
        retention-days: 30
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/paper-formatter-windows.exe
        generate_release_notes: false
        draft: true
        body: |
          ## Paper Formatter Windows Build

          ### Download
          Click on `paper-formatter-windows.exe` above to download.

          ### Usage
          1. Download the .exe file
          2. Double-click to run
          3. No installation needed, portable version

          ### Release Notes
          Check `RELEASE_NOTES_v*.md` files in the repository for details.

          ---

          **GitHub Actions Build** | **Draft Release**
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
