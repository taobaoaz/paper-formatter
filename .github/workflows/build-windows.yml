name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Set UTF-8 encoding
      run: |
        $env:PYTHONUTF8=1
        $env:PYTHONIOENCODING="utf-8"
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r 启动文件/requirements.txt
    
    - name: Build EXE
      run: |
        $env:PYTHONPATH="功能模块;核心模块;$env:PYTHONPATH"
        pyinstaller --onefile --windowed --name="论文排版优化器" `
          --add-data "功能模块/parsers;parsers" `
          --add-data "功能模块/rules;rules" `
          --paths 功能模块 `
          --paths 核心模块 `
          --hidden-import parsers `
          --hidden-import rules `
          核心模块/main.py
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: 论文排版优化器-Windows
        path: dist/论文排版优化器.exe
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/论文排版优化器.exe
        generate_release_notes: false
        draft: true
        body: |
          ## 更新内容

          请查看 RELEASE_NOTES 文件获取详细信息。

          ---

          **注意：** 自动生成的 release notes 可能包含编码问题，请手动编辑。
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
